<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Research Dashboard</title>
<style>
:root{
  --bg:#000;--s1:#1C1C1E;--s2:#2C2C2E;--s3:#3A3A3C;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.14);
  --blue:#0A84FF;--bl2:rgba(10,132,255,.14);--bl3:rgba(10,132,255,.25);
  --green:#30D158;--gr2:rgba(48,209,88,.14);--gr3:rgba(48,209,88,.25);
  --yellow:#FFD60A;--ye2:rgba(255,214,10,.14);
  --orange:#FF9F0A;--or2:rgba(255,159,10,.14);--or3:rgba(255,159,10,.25);
  --red:#FF453A;--re2:rgba(255,69,58,.14);--re3:rgba(255,69,58,.25);
  --indigo:#5E5CE6;--in2:rgba(94,92,230,.14);
  --teal:#5AC8FA;
  --t1:#FFF;--t2:rgba(255,255,255,.58);--t3:rgba(255,255,255,.30);--t4:rgba(255,255,255,.15);
  --st:env(safe-area-inset-top,44px);--sb:env(safe-area-inset-bottom,34px);
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;
}
[data-theme="light"]{
  --bg:#F2F2F7;--s1:#FFF;--s2:#F2F2F7;--s3:#E5E5EA;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.12);
  --t1:#000;--t2:rgba(0,0,0,.60);--t3:rgba(0,0,0,.35);--t4:rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;font-size:16px;min-height:100dvh;overflow-x:hidden}

/* SCREENS */
.screen{position:fixed;inset:0;background:var(--bg);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;transform:translateX(0);transition:transform .32s cubic-bezier(.4,0,.2,1);will-change:transform}
.screen.slide-right{transform:translateX(100%)}
.screen.slide-left{transform:translateX(-20%);pointer-events:none}
#s-landing{z-index:1}
#s-detail{z-index:2}

/* HEADER */
.hdr{position:sticky;top:0;z-index:90;background:rgba(0,0,0,.75);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-bottom:1px solid var(--bd)}
[data-theme="light"] .hdr{background:rgba(242,242,247,.82)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--st) + 8px) 16px 8px}
.hdr-title{font-size:17px;font-weight:700}
.hdr-sub{font-size:12px;color:var(--t3);margin-top:1px}
.hdr-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:50%;background:var(--s2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--t2);position:relative;flex-shrink:0}

/* LANDING TABS */
.landing-tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px 0;border-bottom:1px solid var(--bd);gap:2px}
.landing-tabs::-webkit-scrollbar{display:none}
.ltab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
.ltab.active{color:var(--blue);border-bottom-color:var(--blue)}
.ltab-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--s2);color:var(--t3)}
.ltab.active .ltab-badge{background:var(--bl2);color:var(--blue)}

/* LANDING PANES */
.landing-pane{display:none;animation:fadeIn .2s ease}
.landing-pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* OPPORTUNITY CARDS */
.opp-list{padding:14px 14px calc(var(--sb)+24px);display:flex;flex-direction:column;gap:14px}
.opp-card{background:var(--s1);border-radius:var(--r20);border:1px solid var(--bd);overflow:hidden}
.opp-card-header{padding:16px 16px 12px;display:flex;align-items:center;gap:14px}
.conf-ring-wrap{position:relative;width:64px;height:64px;flex-shrink:0}
.conf-ring-wrap svg{transform:rotate(-90deg)}
.conf-ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.conf-big{font-size:18px;font-weight:800;color:var(--blue);line-height:1}
.conf-denom{font-size:9px;color:var(--t3);font-weight:600}
.opp-header-info{flex:1;min-width:0}
.opp-theme{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:6px}
.opp-pills{display:flex;gap:6px;flex-wrap:wrap}
.opp-pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.pill-active{background:var(--gr2);color:var(--green)}
.pill-accel{background:var(--bl2);color:var(--blue)}
.pill-corr{background:var(--s2);color:var(--t3);border:1px solid var(--bd)}
.opp-divider{height:1px;background:var(--bd);margin:0 16px}
.opp-candidates{padding:12px 16px 8px}
.opp-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:8px}
.candidate-badges{display:flex;flex-wrap:wrap;gap:6px}
.cand-badge{padding:5px 12px;border-radius:20px;background:var(--s2);border:1px solid var(--bd2);font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;transition:all .15s}
.cand-badge:active{transform:scale(.95);background:var(--bl2);color:var(--blue);border-color:var(--bl3)}
.opp-bullets{padding:12px 16px}
.opp-bullet{display:flex;gap:8px;padding:4px 0;font-size:12px;color:var(--t2);line-height:1.45;border-bottom:1px solid var(--bd)}
.opp-bullet:last-child{border-bottom:none}
.bullet-icon{flex-shrink:0;font-size:14px}
.opp-risks{padding:0 16px 12px}
.risk-item{display:flex;gap:10px;padding:6px 0;font-size:12px;color:var(--t3);line-height:1.45;border-bottom:1px solid var(--bd)}
.risk-item:last-child{border-bottom:none}
.opp-footer{padding:12px 16px;background:var(--s2);display:flex;align-items:center;justify-content:space-between}
.opp-footer-meta{font-size:11px;color:var(--t3)}
.explore-btn{font-size:12px;font-weight:700;color:var(--blue);background:none;border:none;cursor:pointer;padding:4px 0}

/* RESEARCH QUEUE */
.queue-sticky{padding:10px 16px 8px;background:var(--s2);border-bottom:1px solid var(--bd)}
.queue-note{font-size:12px;color:var(--t3);line-height:1.4}
.queue-list{padding:0 14px calc(var(--sb)+24px)}
.queue-entry{background:var(--s1);border-radius:var(--r16);border:1px solid var(--bd);margin-top:10px;overflow:hidden;cursor:pointer;transition:transform .1s}
.queue-entry:active{transform:scale(.98)}
.queue-entry.no-detail{cursor:default}
.queue-entry.no-detail:active{transform:none}
.qe-top{display:flex;align-items:flex-start;gap:12px;padding:12px 14px 8px}
.qe-rank{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qe-body{flex:1;min-width:0}
.qe-ticker{font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--t3);margin-bottom:1px}
.qe-company{font-size:14px;font-weight:700;color:var(--t1)}
.qe-reason{font-size:12px;color:var(--t2);line-height:1.5;padding:0 14px 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.qe-footer{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--s2);flex-wrap:wrap}
.qe-opp-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--bl2);color:var(--blue);border:1px solid var(--bl3)}
.qe-pc-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--gr2);color:var(--green);border:1px solid var(--gr3)}
.qe-source{font-size:10px;color:var(--t3)}
.queue-unfilled{margin:10px 0;background:var(--s1);border-radius:var(--r12);border:1px dashed var(--bd2);padding:14px;text-align:center;color:var(--t3);font-size:12px;line-height:1.5}

/* CANDIDATES TAB CONTROLS */
.candidates-controls{background:var(--bg);border-bottom:1px solid var(--bd);position:sticky;top:var(--hdr-h,0);z-index:10}
.sort-bar{display:flex;align-items:center;gap:6px;padding:8px 16px 4px;overflow-x:auto;scrollbar-width:none}
.sort-bar::-webkit-scrollbar{display:none}
.sort-label{font-size:11px;color:var(--t3);flex-shrink:0}
.sort-pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--s2);border:1px solid var(--bd);color:var(--t3);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.sort-pill.active{background:var(--bl2);border-color:var(--bl3);color:var(--blue)}
.chips-row{display:flex;gap:6px;padding:2px 16px 6px;overflow-x:auto;scrollbar-width:none}
.chips-row::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--bl2);border:1px solid var(--bl3);color:var(--blue);white-space:nowrap;flex-shrink:0}
.chip-x{cursor:pointer;opacity:.7;font-size:10px}
.candidates-meta{display:flex;align-items:center;justify-content:space-between;padding:2px 16px 8px}
.result-count{font-size:11px;color:var(--t3);font-weight:500}
.filter-btn-sm{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;background:var(--s2);border:1px solid var(--bd);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;position:relative}
.filter-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--blue);color:#fff;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center}
.filter-badge.visible{display:flex}

/* STOCK CARD GRID */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 12px calc(var(--sb)+24px)}
@media(min-width:600px){.card-grid{grid-template-columns:1fr 1fr 1fr}}
.stock-card{background:var(--s1);border-radius:var(--r16);border:1px solid var(--bd);cursor:pointer;overflow:hidden;transition:transform .12s}
.stock-card:active{transform:scale(.97)}
.card-top{padding:12px 12px 6px;display:flex;justify-content:space-between;align-items:flex-start}
.card-score-col{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.card-zone-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em}
.card-body{padding:0 12px 12px}
.card-ticker{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--t3);margin-bottom:2px}
.card-name{font-size:13px;font-weight:600;color:var(--t1);line-height:1.2;margin-bottom:6px}
.card-stats{display:flex;gap:8px}
.card-stat{flex:1}
.cs-label{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);font-weight:600}
.cs-value{font-size:13px;font-weight:700;color:var(--t2);margin-top:1px}
.card-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.tag{display:inline-block;padding:2px 6px;border-radius:6px;font-size:10px;font-weight:600}
.tag-defence{background:var(--re2);color:var(--red)}
.tag-capex{background:var(--in2);color:var(--indigo)}
.tag-both{background:var(--or2);color:var(--orange)}

/* Zone colors */
.z-strong-buy{background:var(--gr2);color:var(--green)}
.z-buy-zone{background:var(--gr2);color:var(--green)}
.z-fair-value{background:var(--bl2);color:var(--blue)}
.z-watch{background:var(--or2);color:var(--orange)}
.z-expensive{background:var(--re2);color:var(--red)}

/* Empty state */
.empty-state{grid-column:1/-1;text-align:center;padding:48px 24px}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:600;margin-bottom:6px}
.empty-sub{font-size:14px;color:var(--t3);margin-bottom:20px}
.clear-btn{padding:8px 20px;border-radius:20px;background:var(--blue);color:#fff;font-size:14px;font-weight:600;cursor:pointer;border:none}

/* DETAIL HEADER */
.detail-hdr-top{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--st) + 6px) 12px 4px}
.back-btn{display:flex;align-items:center;gap:2px;color:var(--blue);font-size:16px;font-weight:400;background:none;border:none;cursor:pointer;padding:0}
.detail-ticker-badge{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--t3)}
.company-name-header{font-size:14px;font-weight:600;padding:0 12px 2px}
.price-banner{padding:2px 12px 6px;display:flex;align-items:baseline;gap:8px}
.price-val{font-size:24px;font-weight:800;color:var(--t1)}
.price-meta{font-size:11px;color:var(--t3)}
.detail-tabs{display:flex;padding:2px 10px 0;gap:4px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bd)}
.detail-tabs::-webkit-scrollbar{display:none}
.dtab{padding:8px 14px;font-size:13px;font-weight:600;color:var(--t3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.dtab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* PANEL CONTENT */
.panel-content{padding:10px 12px calc(var(--sb)+60px)}
.p-card{background:var(--s1);border-radius:var(--r12);border:1px solid var(--bd);padding:10px 12px;margin-bottom:8px}
.p-card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:8px}
.p2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.metric{background:var(--s1);border-radius:var(--r12);border:1px solid var(--bd);padding:12px}
.metric-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:3px}
.metric-val{font-size:18px;font-weight:700}
.metric-sub{font-size:11px;color:var(--t2);margin-top:2px}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:13px}
.row:last-child{border-bottom:none}
.rk{color:var(--t2)}.rv{font-weight:600}
.rv-g{color:var(--green)}.rv-o{color:var(--orange)}.rv-b{color:var(--blue)}.rv-r{color:var(--red)}

/* ELI15 */
.eli15{background:var(--s1);border-radius:var(--r12);border-left:3px solid var(--blue);padding:10px 12px;margin-bottom:8px}
.eli15-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--blue);margin-bottom:4px}
.eli15-txt{font-size:13px;line-height:1.55;color:var(--t2)}

/* BUY ZONE BAR */
.bz-bar-wrap{margin-bottom:12px}
.bz-gradient{height:12px;border-radius:8px;background:linear-gradient(to right,#0A3B20 0%,#1D5C30 8%,#30D158 29%,#5AC8FA 48%,#5AC8FA 58%,#FFD60A 70%,#FF9F0A 80%,#FF453A 100%);position:relative;margin-bottom:30px}
.bz-marker{position:absolute;top:-4px;transform:translateX(-50%);transition:left 1s cubic-bezier(.4,0,.2,1)}
.bz-dot{width:20px;height:20px;border-radius:50%;background:var(--bg);border:2.5px solid var(--yellow);box-shadow:0 0 14px rgba(255,214,10,.65)}
.bz-label{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;color:var(--yellow);white-space:nowrap}
.bz-zones{display:flex;justify-content:space-between;margin-top:-18px}
.bz-zone-lbl{font-size:8px;color:var(--t3);text-align:center;line-height:1.3}
.bz-prices{display:flex;justify-content:space-between;margin-top:4px;margin-bottom:10px}
.bz-price{font-size:9px;color:var(--t3);text-align:center}
.bz-current{display:flex;align-items:center;justify-content:space-between;background:var(--s1);border-radius:var(--r12);border:1px solid var(--bd);padding:8px 12px;margin-bottom:8px}
.bz-current-info .bz-zone-name{font-size:13px;font-weight:700}
.bz-current-info .bz-dist{font-size:11px;color:var(--t2);margin-top:1px}
.score-big{font-size:28px;font-weight:800;color:var(--blue)}
.score-denom{font-size:13px;color:var(--t3)}
.score-breakdown li{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px;color:var(--t2)}
.score-breakdown li:last-child{border-bottom:none;font-weight:700}
.sb-mod{font-weight:600}

/* SCENARIOS */
.scenario{background:var(--s1);border-radius:var(--r12);border:1px solid var(--bd);overflow:hidden;margin-bottom:8px}
.scen-stripe{height:3px}
.scen-body{padding:9px 10px}
.scen-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.scen-name{font-size:14px;font-weight:700}
.prob-pill{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700}
.scen-thesis{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:8px}
.scen-stats{display:flex;gap:6px;margin-bottom:6px}
.scen-stat{flex:1;background:var(--s2);border-radius:8px;padding:6px;text-align:center}
.scen-stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--t3)}
.scen-stat-val{font-size:12px;font-weight:700;margin-top:1px}
.scen-falsifier{font-size:11px;color:var(--t3)}
.scen-falsifier strong{color:var(--t2)}
.watch-var{background:var(--in2);border:1px solid rgba(94,92,230,.25);border-radius:var(--r12);padding:9px 10px;margin-bottom:8px}
.wv-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--indigo);margin-bottom:3px}
.wv-main{font-size:13px;font-weight:600;color:var(--t1)}
.wv-sub{font-size:11px;color:var(--t2);margin-top:2px}
.conf-row{display:flex;justify-content:space-between;align-items:center;background:var(--s1);border-radius:var(--r12);border:1px solid var(--bd);padding:8px 12px;margin-bottom:6px;font-size:13px}
.conf-lbl{color:var(--t2)}.conf-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}

/* PORTFOLIO */
.pos-status{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pos-dot{width:8px;height:8px;border-radius:50%;background:var(--t4)}
.pos-dot.held{background:var(--green)}
.pos-txt{font-size:14px;font-weight:600}
.rec-card{border-radius:var(--r12);padding:10px 12px;margin-bottom:8px;border:1px solid var(--bl3);background:var(--bl2)}
.rec-card.add{border-color:var(--gr3);background:var(--gr2)}
.rec-card.avoid{border-color:var(--re3);background:var(--re2)}
.rec-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rec-icon{font-size:18px}
.rec-verdict{font-size:15px;font-weight:800}
.rec-body{font-size:12px;line-height:1.5;color:var(--t2)}
.rec-entry{background:var(--s2);border-radius:8px;padding:7px 10px;margin-top:6px;font-size:12px;color:var(--t2)}
.rec-entry strong{color:var(--yellow)}
.bias-card{background:var(--s1);border-radius:var(--r12);border-left:3px solid var(--yellow);padding:9px 12px;margin-bottom:8px}
.bias-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--yellow);margin-bottom:3px}
.bias-txt{font-size:12px;color:var(--t2);line-height:1.45}

/* DYNAMICS */
.players-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;margin-bottom:4px}
.player{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.pl-company{background:var(--bl2);color:var(--blue);border:1px solid var(--bl3)}
.pl-competitor{background:var(--or2);color:var(--orange);border:1px solid var(--or3)}
.pl-customer{background:var(--in2);color:var(--indigo);border:1px solid rgba(94,92,230,.3)}
.pl-regulator{background:var(--re2);color:var(--red);border:1px solid var(--re3)}
.pl-other{background:var(--s2);color:var(--t3);border:1px solid var(--bd)}
.value-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px}
.value-row:last-child{border-bottom:none}
.value-actor{flex:1;color:var(--t2)}
.vbar-wrap{flex:2;height:4px;background:var(--s3);border-radius:3px;overflow:hidden}
.vbar-fill{height:100%;border-radius:3px}

function confRingHTML(score,size=64){
  const r=24,cx=size/2,cy=size/2;
  const circ=2*Math.PI*r;
  const filled=(score/10)*circ;
  return `<div class="conf-ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--s3)" stroke-width="4"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--blue)" stroke-width="4"
        stroke-dasharray="${filled} ${circ}" stroke-linecap="round"/>
    </svg>
    <div class="conf-ring-label"><div class="conf-big">${score}</div><div class="conf-denom">/10</div></div>
  </div>`;
}

function renderCard(s){

  const themeTag=themes.includes('defence')&&themes.includes('capex')
    ?`<span class="tag tag-both">Both</span>`
    :themes.includes('defence')
    ?`<span class="tag tag-defence">Defence</span>`
    :`<span class="tag tag-capex">Capex</span>`;
  return `<div class="stock-card" onclick="openDetailById('${s.id}')">
    <div class="card-top">
      <div>${snow}</div>
      <div class="card-score-col">${ring}<span class="card-zone-badge ${zClass}">${s.zoneLabel}</span></div>
    </div>
    <div class="card-body">

        <div class="card-stat"><div class="cs-label">Action</div><div class="cs-value">${s.actionLabel}</div></div>
      </div>
      <div class="card-meta">${themeTag}</div>
    </div>
  </div>`;
}

// ── FILTER LOGIC ──
function getFilteredStocks(){
  let stocks=[...STOCKS];
  if(STATE.filters.theme!=='all') stocks=stocks.filter(s=>s.themes.includes(STATE.filters.theme));
  const availZones=new Set(stocks.map(s=>s.zone));
  if(STATE.filters.zone!=='all') stocks=stocks.filter(s=>s.zone===STATE.filters.zone);
  if(STATE.filters.score!=='all'){
    if(STATE.filters.score==='high') stocks=stocks.filter(s=>s.poised>=8.0);
    else if(STATE.filters.score==='mid') stocks=stocks.filter(s=>s.poised>=6.0&&s.poised<8.0);
    else if(STATE.filters.score==='low') stocks=stocks.filter(s=>s.poised<6.0);
  }
  if(STATE.filters.action!=='all') stocks=stocks.filter(s=>s.action===STATE.filters.action);
  if(STATE.filters.trend!=='all') stocks=stocks.filter(s=>s.trend===STATE.filters.trend);
  if(STATE.filters.peBand!=='all'){
    if(STATE.filters.peBand==='low') stocks=stocks.filter(s=>s.pe<20);
    else if(STATE.filters.peBand==='mid') stocks=stocks.filter(s=>s.pe>=20&&s.pe<30);
    else if(STATE.filters.peBand==='hi') stocks=stocks.filter(s=>s.pe>=30&&s.pe<=40);
    else if(STATE.filters.peBand==='premium') stocks=stocks.filter(s=>s.pe>40);
  }
  stocks.sort((a,b)=>{
    if(STATE.sort==='poised') return b.poised-a.poised;
    if(STATE.sort==='confidence') return b.confidence-a.confidence;
    if(STATE.sort==='momentum') return b.axes.momentum-a.axes.momentum;
    if(STATE.sort==='return-bull') return b.scenarios[0].returnNum-a.scenarios[0].returnNum;
    if(STATE.sort==='corroboration') return b.corroboration-a.corroboration;
    return 0;
  });
  return{stocks,availZones};
}

      const dis=def.key==='zone'&&o.v!=='all'&&!availZones.has(o.v);
      const act=STATE.filters[def.key]===o.v;
      return `<button class="filter-pill${act?' active':''}${dis?' disabled':''}" onclick="${dis?'':'setFilter(\''+def.key+'\',\''+o.v+'\')'}">${o.l}</button>`;
    }).join('');
    return `<div class="sheet-section"><div class="sheet-section-label">${def.label}</div><div class="pill-row">${pills}</div></div>`;
  }).join('');
}
function setFilter(k,v){STATE.filters[k]=v;renderCandidatesPane();renderFilterSheet();}

// ── SVG SNOWFLAKE ──
function svgSnowflake(axes,size,mini=false){
  const cx=size/2,cy=size/2,R=size*(mini?.38:.36),n=5;
  const keys=['opportunity','valuation','execution','moat','momentum'];
  let grid='';
  for(let lv=1;lv<=5;lv++){
    const pts=keys.map((_,i)=>{const a=(i*2*Math.PI/n)-Math.PI/2,r=(lv/5)*R;return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;});
    grid+=`<polygon points="${pts.join(' ')}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width=".5"/>`;
  }
  let axisL='';
  for(let i=0;i<n;i++){const a=(i*2*Math.PI/n)-Math.PI/2,x=cx+R*Math.cos(a),y=cy+R*Math.sin(a);axisL+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>`;}
  const scorePts=keys.map((k,i)=>{const s=axes[k]||0,a=(i*2*Math.PI/n)-Math.PI/2;return `${cx+R*Math.cos(a)*s/10},${cy+R*Math.sin(a)*s/10}`;});
  let dots='';
  if(mini){keys.forEach((k,i)=>{const s=axes[k]||0,a=(i*2*Math.PI/n)-Math.PI/2,x=cx+R*Math.cos(a)*s/10,y=cy+R*Math.sin(a)*s/10;dots+=`<circle cx="${x}" cy="${y}" r="2.5" fill="#0A84FF"/>`;});}
  let labels='';
  if(!mini){
    ['Opportunity','Valuation','Execution','Moat','Momentum'].forEach((nm,i)=>{
      const a=(i*2*Math.PI/n)-Math.PI/2,lx=cx+R*1.32*Math.cos(a),ly=cy+R*1.32*Math.sin(a);
      const anchor=lx<cx-4?'end':lx>cx+4?'start':'middle',dy=ly<cy-4?0:ly>cy+4?4:2;
      labels+=`<text x="${lx}" y="${ly+dy}" text-anchor="${anchor}" fill="rgba(255,255,255,.5)" font-size="8" font-family="-apple-system,sans-serif" class="sf-label" data-axis="${nm.toLowerCase()}" style="cursor:pointer">${nm}</text>`;
    });
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${grid}${axisL}<polygon points="${scorePts.join(' ')}" fill="rgba(10,132,255,.18)" stroke="#0A84FF" stroke-width="${mini?1:1.5}" stroke-linejoin="round"/>${dots}${labels}</svg>`;
}

function miniPoisedRing(score){
  const r=16,circ=2*Math.PI*r,filled=(score/10)*circ;
  const col=score>=8?'var(--green)':score>=7?'var(--blue)':'var(--orange)';
  return `<svg class="poised-ring-sm" width="40" height="40" viewBox="0 0 40 40" style="transform:rotate(-90deg)">
    <circle cx="20" cy="20" r="${r}" fill="none" stroke="var(--s3)" stroke-width="3.5"/>
    <circle cx="20" cy="20" r="${r}" fill="none" stroke="${col}" stroke-width="3.5" stroke-dasharray="${filled} ${circ}" stroke-linecap="round"/>
    <text x="20" y="20" text-anchor="middle" dominant-baseline="central" fill="${col}" font-size="9" font-weight="800" font-family="-apple-system,sans-serif" style="transform:rotate(90deg);transform-origin:20px 20px">${score}</text>
  </svg>`;
}

// ── NAVIGATION ──
function openDetailById(id){
  const s=STOCKS.find(x=>x.id===id);
  if(!s)return;
  STATE.activeStock=id;
  STATE.detailTab='snowflake';
  STATE.activeAxis='opportunity';
  renderDetail(s);
  const landing=document.getElementById('s-landing');
  landing.style.visibility='';
  landing.classList.add('slide-left');
  document.getElementById('s-detail').classList.remove('slide-right');
  STATE.screen='detail';
  clearTimeout(STATE._hideTimer);
  // Hide landing from GPU compositing after slide completes (340ms > 320ms transition)
  STATE._hideTimer=setTimeout(()=>{landing.style.visibility='hidden';},340);
}

function goBack(){
  clearTimeout(STATE._hideTimer);
  const landing=document.getElementById('s-landing');
  landing.style.visibility='';  // restore before reverse animation
  landing.classList.remove('slide-left');
  document.getElementById('s-detail').classList.add('slide-right');
  STATE.screen='landing';
}

// ── SWIPE BACK ──
let _tx=0,_sx=0;
function setupEventListeners(){
  const det=document.getElementById('s-detail');
  det.addEventListener('touchstart',e=>{_sx=e.touches[0].clientX;_tx=0;},{passive:true});
  det.addEventListener('touchmove',e=>{_tx=e.touches[0].clientX-_sx;},{passive:true});
  det.addEventListener('touchend',()=>{if(_tx>70&&STATE.screen==='detail')goBack();});
}

// ── DETAIL SCREEN ──
function renderDetail(s){
  document.getElementById('detail-ticker').textContent=`NSE · ${s.id}`;
  document.getElementById('detail-name').textContent=s.name;
  document.getElementById('detail-price').textContent=`₹${s.price.toLocaleString('en-IN')}`;
  document.getElementById('detail-price-meta').textContent=`· as of ${s.priceDate}`;

  const tabs=['snowflake','buyzoneTab','scenarios','portfolio','dynamics'];
  const labels=['Snowflake','Buy Zone','Scenarios','Portfolio','Dynamics'];
  document.getElementById('detail-tabs').innerHTML=tabs.map((t,i)=>
    `<button class="dtab${STATE.detailTab===t?' active':''}" onclick="switchDetailTab('${t}',this)">${labels[i]}</button>`
  ).join('');
  renderDetailTab(s);
}

function switchDetailTab(tab,btn){
  STATE.detailTab=tab;
  document.querySelectorAll('#detail-tabs .dtab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const s=STOCKS.find(x=>x.id===STATE.activeStock);
  if(s) renderDetailTab(s);
}

function renderDetailTab(s){
  const el=document.getElementById('detail-content');
  if(STATE.detailTab==='snowflake') el.innerHTML=renderSnowflakeTab(s);
  else if(STATE.detailTab==='buyzoneTab') el.innerHTML=renderBuyZoneTab(s);
  else if(STATE.detailTab==='scenarios') el.innerHTML=renderScenariosTab(s);
  else if(STATE.detailTab==='portfolio') el.innerHTML=renderPortfolioTab(s);
  else if(STATE.detailTab==='dynamics') el.innerHTML=renderDynamicsTab(s);

  // Wire up snowflake label clicks
  el.querySelectorAll('.sf-label').forEach(lbl=>{
    lbl.addEventListener('click',()=>selectSfAxis(lbl.dataset.axis));
  });
  // Wire up axis legend clicks (non-snowflake tabs)
  el.querySelectorAll('.axis-leg').forEach(leg=>{
    leg.addEventListener('click',()=>openAxisSheet(leg.dataset.axis,s));
  });
  // Animate buy zone marker
  if(STATE.detailTab==='buyzoneTab'){
    setTimeout(()=>{
      const m=document.getElementById('bz-marker-'+s.id);
      if(m) m.style.left=bzPct(s.price,s.fv.base)+'%';
    },60);
  }
}

// ── TABS: SNOWFLAKE ──
function renderSnowflakeTab(s){
  const snow=svgSnowflake(s.axes,140,false);
  const chips=Object.entries(AXIS_INFO).map(([k,v])=>{
    const active=STATE.activeAxis===k;
    return `<button class="sf-chip${active?' active':''}" data-axis="${k}" onclick="selectSfAxis('${k}')">${v.label}<span class="sf-chip-score">${s.axes[k]}</span></button>`;
  }).join('');
  const whyNow=s.whyNow.map(w=>`<div class="opp-bullet"><span class="bullet-icon">⚡</span><span style="font-size:13px;color:var(--t2)">${w}</span></div>`).join('');
  const fins=s.financials.map(f=>{
    const col=f.col==='green'?'rv-g':f.col==='orange'?'rv-o':f.col==='blue'?'rv-b':'';
    return `<div class="row"><span class="rk">${f.lbl}</span><div><div class="rv ${col}">${f.val}</div><div style="font-size:10px;color:var(--t3)">${f.sub}</div></div></div>`;
  }).join('');
  return `
    <div class="p-card" style="padding-bottom:8px"><div class="p-card-title">Why Now</div>${whyNow}</div>
    <div class="sf-wrap-sm">${snow}</div>
    <div class="sf-chips-row">${chips}</div>
    <div id="sf-reasoning-panel">${renderSfReasoningPanel(s,STATE.activeAxis)}</div>
    <div class="p-card"><div class="p-card-title">Key Financials</div>${fins}</div>`;
}

function renderSfReasoningPanel(s,axisKey){
  const info=AXIS_INFO[axisKey];
  if(!info)return'';
  const score=s.axes[axisKey];
  const r=s.snowflakeReasoning&&s.snowflakeReasoning[axisKey];
  if(!r){
    return `<div class="sr-panel"><div class="sr-empty">No stock-specific reasoning for <strong>${info.label}</strong> yet.<br>Run /stock-dashboard ${s.id} to generate it.</div><button class="sr-how-btn" onclick="openAxisSheet('${axisKey}',STOCKS.find(x=>x.id==='${s.id}'))">How this score works ›</button></div>`;
  }
  const posDrivers=r.pos.map(d=>`<div class="sr-driver"><span class="sr-driver-text">${d.driver}</span><span class="sr-impact pos">${d.impact}</span></div>`).join('');
  const negDrivers=r.neg.map(d=>`<div class="sr-driver"><span class="sr-driver-text">${d.driver}</span><span class="sr-impact neg">${d.impact}</span></div>`).join('');
  const evTags=r.evidence.map(e=>`<span class="sr-ev-tag">${e}</span>`).join('');
  const posSection=posDrivers?`<div class="sr-section"><div class="sr-sec-label pos">Positive Drivers</div>${posDrivers}</div>`:'';
  const negSection=negDrivers?`<div class="sr-section" style="border-top:1px solid var(--bd)"><div class="sr-sec-label neg">Negative Drivers</div>${negDrivers}</div>`:'';
  return `<div class="sr-panel">
    <div class="sr-head">
      <div class="sr-score-row"><span class="sr-score-num">${score}</span><span class="sr-score-denom">/10</span><span class="sr-score-label">${info.label}</span></div>
      <div class="sr-subtitle">Why ${s.id} scored ${score} on ${info.label}</div>
    </div>
    ${posSection}${negSection}
    <div class="sr-evidence"><div class="sr-ev-label">Evidence Sources</div><div class="sr-ev-tags">${evTags}</div></div>
    <div class="sr-bottom"><div class="sr-bottom-label">Bottom Line</div><div class="sr-bottom-text">${r.bottomLine}</div></div>
    <button class="sr-how-btn" onclick="openAxisSheet('${axisKey}',STOCKS.find(x=>x.id==='${s.id}'))">How this score works ›</button>
  </div>`;
}

function selectSfAxis(axisKey){
  STATE.activeAxis=axisKey;
  const s=STOCKS.find(x=>x.id===STATE.activeStock);
  if(!s)return;
  document.querySelectorAll('.sf-chip').forEach(c=>c.classList.toggle('active',c.dataset.axis===axisKey));
  const panel=document.getElementById('sf-reasoning-panel');
  if(panel) panel.innerHTML=renderSfReasoningPanel(s,axisKey);
}

// ── TABS: BUY ZONE ──
function bzPct(price,fvBase){
  const barMin=fvBase*.40,barMax=fvBase*1.60;
  return Math.min(97,Math.max(3,((price-barMin)/(barMax-barMin))*100));
}
function renderBuyZoneTab(s){
  const zones=['Strong Buy','Buy Zone','Fair Value','Watch','Expensive'];
  const zoneLabels=zones.map(z=>`<span class="bz-zone-lbl">${z}</span>`).join('');
  const thresholds=[s.fv.bear*.75,s.fv.bear,s.fv.base,s.fv.base*1.10,s.fv.bull*.85];
  const prices=thresholds.map(p=>`<span class="bz-price">₹${p.toLocaleString('en-IN',{maximumFractionDigits:0})}</span>`).join('');
  const pct=bzPct(s.price,s.fv.base);
  const dist=((s.fv.base-s.price)/s.price*100).toFixed(1);
  const distStr=parseFloat(dist)>0?`${dist}% below Fair Value`:Math.abs(parseFloat(dist)).toFixed(1)+'% above Fair Value';
  const sbItems=s.scoreBreakdown.map(row=>{
    const mod=row.type==='pos'?'rv-g':row.type==='neg'?'rv-r':row.type==='total'?'rv-b':'';
    return `<li><span>${row.lbl}</span><span class="sb-mod ${mod}">${row.val}</span></li>`;
  }).join('');
  return `
    <div class="p-card">
      <div class="p-card-title">Buy Zone Bar</div>
      <div class="bz-bar-wrap">
        <div class="bz-gradient">
          <div class="bz-marker" id="bz-marker-${s.id}" style="left:3%">
            <div class="bz-dot"></div>
            <div class="bz-label">₹${s.price.toLocaleString('en-IN')}</div>
          </div>
        </div>
        <div class="bz-zones">${zoneLabels}</div>
        <div class="bz-prices">${prices}</div>
      </div>
      <div class="bz-current">
        <div class="bz-current-info">
          <div class="bz-zone-name z-${s.zone}" style="padding:3px 10px;border-radius:10px;display:inline-block">${s.zoneLabel}</div>
          <div class="bz-dist" style="margin-top:6px">${distStr}</div>
        </div>
        <div><span class="score-big">${s.poised}</span><span class="score-denom">/10</span></div>
      </div>
    </div>
    <div class="p-card">
      <div class="p-card-title">Poised Score Breakdown</div>
      <ul class="score-breakdown" style="list-style:none">${sbItems}</ul>
    </div>
    <div class="eli15"><div class="eli15-lbl">ELI15</div><div class="eli15-txt">${s.eli15}</div></div>`;
}

// ── TABS: SCENARIOS ──
function renderScenariosTab(s){
  const scens=s.scenarios.map(sc=>{
    const col=sc.col==='green'?'var(--green)':sc.col==='red'?'var(--red)':'var(--blue)';
    const bg=sc.col==='green'?'var(--gr2)':sc.col==='red'?'var(--re2)':'var(--bl2)';
    return `<div class="scenario">
      <div class="scen-stripe" style="background:${col}"></div>
      <div class="scen-body">
        <div class="scen-header">
          <span class="scen-name" style="color:${col}">${sc.name} Case</span>
          <span class="prob-pill" style="background:${bg};color:${col}">${sc.prob}%</span>
        </div>
        <div class="scen-thesis">${sc.thesis}</div>
        <div class="scen-stats">
          <div class="scen-stat"><div class="scen-stat-lbl">2yr Return</div><div class="scen-stat-val" style="color:${col}">${sc.return2yr}</div></div>
          <div class="scen-stat"><div class="scen-stat-lbl">Probability</div><div class="scen-stat-val">${sc.prob}%</div></div>
        </div>
        <div class="scen-falsifier"><strong>Key assumption:</strong> ${sc.assumption}<br><strong>Invalidated if:</strong> ${sc.falsifier}</div>
      </div>
    </div>`;
  }).join('');
  const confCol=s.confLabel.includes('High')?'var(--green)':s.confLabel.includes('Low')?'var(--orange)':'var(--blue)';
  const confBg=s.confLabel.includes('High')?'var(--gr2)':s.confLabel.includes('Low')?'var(--or2)':'var(--bl2)';
  return `
    ${scens}
    <div class="watch-var"><div class="wv-lbl">Key Watch Variable</div><div class="wv-main">${s.watchVariable}</div><div class="wv-sub">${s.watchSub}</div></div>
    <div class="conf-row"><span class="conf-lbl">Probability Confidence</span><span class="conf-badge" style="background:${confBg};color:${confCol}">${s.confLabel}</span></div>
    <div class="p-card" style="font-size:12px;color:var(--t3)">${s.confReason}</div>`;
}

// ── TABS: PORTFOLIO ──
function renderPortfolioTab(s){
  const isAdd=s.action==='add';
  const recClass=isAdd?'add':s.action==='avoid'?'avoid':'';
  const recIcon=isAdd?'📈':s.action==='avoid'?'🚫':'👁';
  return `
    <div class="p-card">
      <div class="p-card-title">Current Position</div>
      <div class="pos-status"><div class="pos-dot${s.held?' held':''}"></div><div class="pos-txt">${s.held?'Currently held':'Not held'}</div></div>
      <div class="row"><span class="rk">Portfolio slot</span><span class="rv">${s.slot}</span></div>
    </div>
    <div class="rec-card ${recClass}">
      <div class="rec-header"><span class="rec-icon">${recIcon}</span><span class="rec-verdict">${s.portfolioRec}</span></div>
      <div class="rec-body">${s.portfolioBody}</div>
      ${s.portfolioEntry?`<div class="rec-entry"><strong>Entry guidance:</strong> ${s.portfolioEntry}</div>`:''}
    </div>
    <div class="bias-card"><div class="bias-lbl">Behavioural Check</div><div class="bias-txt">${s.bias}</div></div>`;
}

// ── TABS: DYNAMICS ──
function renderDynamicsTab(s){
  const d=s.dynamics;
  const VCOLS=['#30D158','#0A84FF','#FF9F0A','#FF453A'];
  const players=d.players.map(p=>`<span class="player pl-${p.type}">${p.name}</span>`).join('');
  const valRows=d.valueRows.map((r,i)=>`
    <div class="value-row">
      <span class="value-actor">${r.actor}</span>
      <div class="vbar-wrap"><div class="vbar-fill" style="width:${r.pct}%;background:${VCOLS[i]||VCOLS[0]}"></div></div>
      <span class="value-pct" style="color:${VCOLS[i]||VCOLS[0]}">${r.pct}%</span>
    </div>`).join('');
  const wc=d.wildcards.map(w=>`<li class="wildcard-item"><span class="wc-icon">${w.icon}</span><span>${w.text}</span></li>`).join('');
  return `
    <div class="p-card"><div class="p-card-title">Game Type</div>
      <div style="font-size:14px;font-weight:600;color:var(--blue);margin-bottom:6px">${d.gameType}</div>
      <div style="font-size:13px;color:var(--t2);line-height:1.5">${d.gameNote}</div>
    </div>
    <div class="p-card"><div class="p-card-title">Players</div><div class="players-wrap">${players}</div>
      <div style="font-size:12px;color:var(--t3);margin-top:10px"><strong style="color:var(--t2)">Info asymmetry:</strong> ${d.asymmetry}</div>
    </div>
    <div class="p-card"><div class="p-card-title">Who Captures Value?</div>${valRows}
      <div style="font-size:12px;color:var(--t3);margin-top:8px">${d.valueSummary}</div>
    </div>
    <div class="p-card"><div class="p-card-title">Equilibrium</div><div style="font-size:13px;color:var(--t2);line-height:1.5">${d.equilibrium}</div></div>
    <div class="p-card"><div class="p-card-title">Behavioural Wildcards</div><ul class="wildcard-list">${wc}</ul></div>
    <div class="eli15"><div class="eli15-lbl">ELI15 — Strategic Summary</div><div class="eli15-txt">${d.eli15}</div></div>`;
}

// ── AXIS TOOLTIP SHEET ──
function openAxisSheet(axisName,s){
  const info=AXIS_INFO[axisName];
  if(!info)return;
  const score=s.axes[axisName]||0;
  document.getElementById('axis-sheet-body').innerHTML=`
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--blue);margin-bottom:8px">How this score works: ${info.label}</div>
    <div class="axis-score-large">${score}<span style="font-size:20px;color:var(--t3)">/10</span></div>
    <div class="axis-def">${info.def}</div>
    <div class="axis-what-changes"><strong>What changes this score:</strong><br>${info.changes}</div>`;
  document.getElementById('axis-backdrop').classList.add('open');
  document.getElementById('axis-sheet').classList.add('open');
}
function closeAxisSheet(){
  document.getElementById('axis-backdrop').classList.remove('open');
  document.getElementById('axis-sheet').classList.remove('open');
}

// ── START ──
init();
</script>
