name: Weekly Evidence Fetch

on:
  schedule:
    # 03:30 UTC = 09:00 IST every Sunday
    - cron: '30 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4.2.2
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run evidence fetch
        run: python scripts/fetch_evidence.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 02_RAW_DOCUMENTS/ data/
          if git diff --cached --quiet; then
            echo "No new evidence — nothing to commit"
          else
            git commit -m "chore: weekly evidence fetch $(date -u +%Y-%m-%d)"
            git push origin main
          fi
