name: Weekly Opportunity Scan

# NOTE: This workflow runs the full AI pipeline (Claude Code) in CI.
# It requires ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN in repo secrets.
# If neither is set, the pipeline step is skipped gracefully.
#
# The recommended operating model is the hybrid approach:
#   1. weekly-evidence-fetch.yml runs automatically on Sunday (no API key needed)
#   2. You run Claude Code locally after git pull to process the evidence
# This workflow is provided for teams that prefer fully automated Sunday runs.

on:
  schedule:
    # Every Sunday at 3:00 AM UTC (8:30 AM IST)
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      skip_to:
        description: 'Skip to a specific agent (universe-manager / collection / extraction / delta / theme / screener / eli15)'
        required: false
        default: 'universe-manager'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Check for API credentials
        id: check-creds
        run: |
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ] || [ -n "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "has_creds=true" >> $GITHUB_OUTPUT
          else
            echo "has_creds=false" >> $GITHUB_OUTPUT
            echo "::warning::No ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN secret configured. Pipeline step skipped. Set one in Settings → Secrets to enable automated Sunday runs."
          fi

      - name: Run Opportunity Discovery Engine
        if: steps.check-creds.outputs.has_creds == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: --model claude-sonnet-4-6
          prompt: |
            Run the full Opportunity Discovery Engine weekly pipeline in sequence.
            Use the /weekly-run skill to execute all stages:
            1. universe-manager — refresh Nifty 1000 + news discovery
            2. collection-agent — catalogue latest documents for all companies
            3. extraction-agent — extract signals from any new documents
            4. delta-agent — detect changes vs prior period for each company
            5. theme-agent — cluster signals into themes, update scores
            6. opportunity-screener — produce Top 10 + Top 3 weekly report
            7. eli15-agent — convert output to plain English weekly brief

            After each stage completes, commit its outputs before moving to the next.
            Push all commits to main when the full pipeline is done.

            Today's date: use the actual current date.
            If any stage finds no new data to process, log that and continue to the next stage.
