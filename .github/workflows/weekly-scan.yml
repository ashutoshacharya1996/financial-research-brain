name: Weekly Opportunity Scan

on:
  schedule:
    # Every Sunday at 3:00 AM UTC (8:30 AM IST)
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      skip_to:
        description: 'Skip to a specific agent (universe-manager / collection / extraction / delta / theme / screener / eli15)'
        required: false
        default: 'universe-manager'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Run Opportunity Discovery Engine
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          prompt: |
            Run the full Opportunity Discovery Engine weekly pipeline in sequence.
            Use the /weekly-run skill to execute all stages:
            1. universe-manager — refresh Nifty 1000 + news discovery
            2. collection-agent — catalogue latest documents for all companies
            3. extraction-agent — extract signals from any new documents
            4. delta-agent — detect changes vs prior period for each company
            5. theme-agent — cluster signals into themes, update scores
            6. opportunity-screener — produce Top 10 + Top 3 weekly report
            7. eli15-agent — convert output to plain English weekly brief

            After each stage completes, commit its outputs before moving to the next.
            Push all commits to main when the full pipeline is done.

            Today's date: use the actual current date.
            If any stage finds no new data to process, log that and continue to the next stage.
